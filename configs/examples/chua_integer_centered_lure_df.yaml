#   max_trajectories_to_plot: 60

basin:
  enabled: true
  planes: ["xy"]
  grid_n: 100
  x_interval: [-10.0, 10.0]
  y_interval: [-10.0, 10.0]
  z_interval: [-10.0, 10.0]
  fixed_x: 0.0
  fixed_y: 0.0
  fixed_z: 0.0
  around_equilibria: true
  equilibrium_selection: "E+"
  local_radius: 2.0
  t_final: 200.0
  t_burn: 120.0
  h: 0.01
