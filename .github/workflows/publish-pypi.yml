name: Publish Python Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: version_2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: version_2/pyproject.toml
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Install package for validation
        run: python -m pip install -e ".[dev,analysis,legacy]"
      - name: Validate release readiness
        run: hidden-attractors validate release-readiness --submission-strict
      - name: Run quick tests
        run: python -m pytest -q -m "not slow"
      - name: Build package
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: version_2/dist/
