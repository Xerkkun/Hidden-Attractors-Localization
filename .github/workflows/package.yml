name: Package

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: version_2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: version_2/pyproject.toml
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Build package
        run: python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - name: Test wheel install
        run: |
          python -m venv /tmp/ha-wheel-test
          /tmp/ha-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/ha-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/ha-wheel-test/bin/hidden-attractors --help
          /tmp/ha-wheel-test/bin/hidden-attractors seed --help
          /tmp/ha-wheel-test/bin/python -c "import hidden_attractors; print('import ok')"
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hidden-attractors-fo-dist
          path: version_2/dist/*
