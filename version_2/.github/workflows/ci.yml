name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Main test matrix: Ubuntu + Windows, Python 3.11 + 3.12
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: "test / ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      # ── Python FIRST — must come before any compiler or pip step ────────────
      # This ensures `python` and `python -m pip` always refer to the matrix
      # version, not the runner's system Python (which may be 3.10 on Ubuntu).
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Confirm Python version
        shell: bash
        run: |
          python --version
          python -c "import sys; assert sys.version_info >= (3, 11), f'Expected >=3.11, got {sys.version_info}'"

      # ── C compiler ──────────────────────────────────────────────────────────
      # Ubuntu: gcc is pre-installed. Windows: MSYS2 is pre-installed on the
      # runner; we only need to add UCRT64/bin to PATH.
      - name: Expose MSYS2 gcc on PATH (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gccPath = "C:\msys64\ucrt64\bin"
          if (Test-Path "$gccPath\gcc.exe") {
            Write-Host "Adding $gccPath to PATH"
            "$gccPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Host "::warning::gcc.exe not found in $gccPath; C backend tests will be skipped"
          }

      - name: Show C compiler (informational)
        shell: bash
        run: gcc --version || echo "::warning::gcc not found — C backend tests will be skipped"
        continue-on-error: true

      # ── Install ─────────────────────────────────────────────────────────────
      # Always use `python -m pip` (never bare `pip`) so we use the matrix
      # Python, not whatever pip the runner has as the system default.
      - name: Install package and dev dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install pytest-benchmark (optional)
        shell: bash
        run: python -m pip install "pytest-benchmark>=4.0" || echo "::warning::pytest-benchmark install failed — benchmark tests will be skipped"
        continue-on-error: true

      # ── Syntax check ────────────────────────────────────────────────────────
      - name: Compile-check all Python sources
        shell: bash
        run: python -m compileall -q hidden_attractors examples tests tools/cli

      # ── Test suite ──────────────────────────────────────────────────────────
      # ALLOW_NO_OPENMP=1: build C backends without -fopenmp when libgomp/libomp
      # is not available. The pure-Python solver is always available as fallback.
      - name: Run pytest
        shell: bash
        env:
          ALLOW_NO_OPENMP: "1"
        run: python -m pytest -q --tb=short

      # ── Example smoke tests ─────────────────────────────────────────────────
      - name: Smoke test — quickstart_equilibria
        shell: bash
        run: python examples/quickstart_equilibria.py

      - name: Smoke test — list_final_candidates
        shell: bash
        # Candidate data files may not be in the repo; treat absence as warning.
        run: python examples/list_final_candidates.py || echo "::warning::list_final_candidates.py found no candidate data files"
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # Dependency floor: verify that the declared minimum versions can be
  # installed and imported together.
  # ────────────────────────────────────────────────────────────────────────────
  deps-floor:
    name: "deps-floor / ubuntu / py3.11"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python FIRST — same reason as above.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Confirm Python version
        run: python --version

      - name: Install at declared minimum versions
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy==1.26.0" "matplotlib==3.8.0"
          python -m pip install -e . --no-deps

      - name: Verify import at minimum versions
        run: |
          python -c "
          import numpy, matplotlib, hidden_attractors
          print('numpy     :', numpy.__version__)
          print('matplotlib:', matplotlib.__version__)
          print('import OK')
          "

  # ────────────────────────────────────────────────────────────────────────────
  # C backend build report — informational only, never blocks merges.
  # ────────────────────────────────────────────────────────────────────────────
  c-backend-report:
    name: "c-backend / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: test
    if: always()

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Expose MSYS2 gcc on PATH (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gccPath = "C:\msys64\ucrt64\bin"
          if (Test-Path "$gccPath\gcc.exe") {
            "$gccPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: C backend build report
        shell: bash
        env:
          ALLOW_NO_OPENMP: "1"
        run: |
          python -c "
          import platform, sys
          from hidden_attractors.native.backends import FractionalChuaBackend, BasinBackend
          print('Python  :', sys.version.split()[0])
          print('Platform:', platform.platform())
          for cls in [FractionalChuaBackend, BasinBackend]:
              name = cls.__name__
              try:
                  cls.build()
                  print(name, ': BUILD OK')
              except Exception as exc:
                  print(name, ': BUILD FAILED -', exc)
          "
        continue-on-error: true
