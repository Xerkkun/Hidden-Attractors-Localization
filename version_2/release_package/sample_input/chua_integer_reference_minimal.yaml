experiment:
  name: "Sample integer Chua reference"
  description: "Small integer-order Chua reference configuration for interface checks; not promoted evidence."
  output_dir: "outputs/release_samples/chua_integer_reference_minimal"

system:
  system_id: "chua_integer_saturation"
  q: 1.0
  parameters:
    alpha: 8.4562
    beta: 12.0732
    gamma: 0.0052
    m0: -0.1768
    m1: -1.1468

modes:
  transfer_mode: "integer"
  seed_mode: "integer"
  continuation_mode: "integer"
  dynamics_mode: "system"

integrator:
  name: "heun"
  h: 0.01

stages:
  seed_search: true
  continuation: false
  final_simulation: false
  hiddenness_tests: false
  sphere_tests: false
  basin_slices: false
  bifurcation: false
  attractor_only: false

seed_search:
  strategy: "k_phi"
  construction: "modal"
  branch_index: 0
  omega_min: 0.01
  omega_max: 8.0
  amplitude_min: 0.01
  amplitude_max: 8.0
  grid_size_omega: 24
  grid_size_amplitude: 24
  root_refinement: false
  df_residual_tol: 1.0e-2

simulation:
  t_final: 2.0
  t_burn: 0.5

plots:
  enabled: false
  save_figures: false
  attractor: false
  timeseries: false
  transfer: false
  describing_function: false
  continuation: false
