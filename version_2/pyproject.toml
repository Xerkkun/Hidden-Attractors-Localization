[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hidden-attractors-fo"
version = "0.1.0"
description = "Numerical workflows for locating and verifying hidden attractor candidates in fractional-order systems."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "License pending" }
authors = [
  { name = "Hidden Attractors Fractional Order project" }
]
keywords = ["fractional-order systems", "hidden attractors", "Chua", "Caputo", "EFORK"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
  "matplotlib",
  "numpy",
]

[project.optional-dependencies]
dev = [
  "pytest",
]
analysis = [
  "antropy",
  "nolds",
]
docs = [
  "mkdocs",
  "mkdocs-material",
]
legacy = [
  "PyYAML",
  "scipy",
]
pydstool = [
  "PyDSTool",
]

[project.urls]
Homepage = "https://github.com/Xerkkun/Hidden-Attractors-Localization/tree/main/version_2"
Documentation = "https://github.com/Xerkkun/Hidden-Attractors-Localization/tree/main/version_2/docs"
Repository = "https://github.com/Xerkkun/Hidden-Attractors-Localization"

[project.scripts]
hidden-attractors-list-candidates = "hidden_attractors.cli:list_candidates"
hidden-attractors-systems = "hidden_attractors.cli:systems"
hidden-attractors-legacy = "hidden_attractors.legacy:main"
hidden-attractors-unified-chua = "hidden_attractors.workflows.unified_chua:main"
hidden-attractors-robustness-overlay = "hidden_attractors.workflows.robustness_overlay:main"
hidden-attractors-sphere-controls = "hidden_attractors.workflows.sphere_controls:main"
hidden-attractors-refined-basin = "hidden_attractors.workflows.refined_basin:main"
hidden-attractors-extended-search = "hidden_attractors.legacy:extended_search"
hidden-attractors-danca2017 = "hidden_attractors.legacy:danca2017"
hidden-attractors-nyquist-pipeline = "hidden_attractors.legacy:nyquist_pipeline"
hidden-attractors-integer-chua = "hidden_attractors.legacy:integer_chua"
hidden-attractors-hidden-verify = "hidden_attractors.legacy:hidden_verify"
hidden-attractors-basin-compare = "hidden_attractors.legacy:basin_compare"
hidden-attractors-positive-x-basin = "hidden_attractors.legacy:positive_x_basin"
hidden-attractors-machado-targeted = "hidden_attractors.legacy:machado_targeted"

[tool.setuptools.packages.find]
include = ["hidden_attractors*", "tools*"]

[tool.setuptools.package-data]
hidden_attractors = ["native/csrc/*.c"]
"tools.legacy" = ["*.c", "*.ps1", "README.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
  "-p",
  "no:cacheprovider",
]
