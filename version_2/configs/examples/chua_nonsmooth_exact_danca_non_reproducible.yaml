# =============================================================================
# Chua Fraccionario No Suave — Sistema Exacto de Danca (2017)
# =============================================================================
# Configuración con los parámetros exactos del artículo:
# "Hidden chaotic attractors in fractional-order systems" (Danca, 2017).
#
# ⚠️ ADVERTENCIA CIENTÍFICA CRÍTICA DE REPRODUCIBILIDAD:
# Este procedimiento y configuración demuestran operacionalmente que la reproducción
# exacta directa a partir del artículo de Danca (2017) NO conduce a ningún resultado
# confiable ni verificado debido a la falta de información publicada crucial:
#
# 1. No se publican las coordenadas de la condición inicial para el atractor oculto.
# 2. No se especifican explícitamente los parámetros del resolvedor numérico de la DF
#    (como omega0, la ganancia k o la amplitud A0).
# 3. No se detalla el método de continuación numérica ni el algoritmo exacto para el
#    integrador de Caputo ABM.
#
# Como consecuencia, al ejecutar la búsqueda de semillas y el pipeline con estos
# parámetros exactos y los algoritmos estándar del framework, los resultados no se
# pueden certificar ni reproducir de forma robusta frente a vecindades locales.
# =============================================================================

experiment:
  name: "Chua Fraccionario No Suave — Parámetros Exactos Danca"
  description: >
    Evaluación de la reproducibilidad del caso exacto publicado de Danca (2017)
    (q = 0.9998) con m1 = -1.1468 y m0 = -0.1768. Nota: No se puede certificar
    ocultedad global debido a la falta de datos publicados de condiciones iniciales.
  output_dir: "outputs/danca_exact_non_reproducible"

system:
  system_id: "chua_fractional_saturation"
  q: 0.9998
  parameters:
    alpha: 8.4562
    beta: 12.0732
    gamma: 0.0052
    m0: -0.1768
    m1: -1.1468

modes:
  transfer_mode: "published_integer_laplace"
  seed_mode: "fractional"
  continuation_mode: "fractional"
  dynamics_mode: "system"

integrator:
  name: "abm"
  h: 0.01
  memory_mode: "full"
  memory_policy: "full_history"
  caputo_history_accumulated: true

stages:
  seed_search: true
  continuation: true
  final_simulation: true
  hiddenness_tests: true  # Permite verificar que no se alcanza un atractor confiable
  sphere_tests: false
  basin_slices: false
  bifurcation: false
  attractor_only: false

seed_search:
  strategy: "k_phi"
  construction: "modal"
  branch_index: 0
  omega_min: 0.01
  omega_max: 20.0
  amplitude_min: 0.01
  amplitude_max: 20.0
  grid_size_omega: 200
  grid_size_amplitude: 200
  root_refinement: true
  df_residual_tol: 1.0e-8

simulation:
  t_final: 300.0
  t_burn: 120.0

plots:
  enabled: true
  save_figures: true
  attractor: true
  timeseries: true
  transfer: true
  describing_function: true
  continuation: true
