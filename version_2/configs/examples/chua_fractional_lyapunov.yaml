# Configuración de ejemplo para análisis de Lyapunov en Chua fraccional
experiment:
  name: "Chua Fractional Lyapunov"
  description: "Estimation of Lyapunov exponent spectrum for fractional Chua system"
  output_dir: "outputs/chua_fractional_lyapunov"

system:
  system_id: "chua_fractional_saturation"
  q: 0.98
  parameters:
    alpha: 8.4562
    beta: 12.0732
    gamma: 0.0052
    m0: -0.1768
    m1: -1.1468

stages:
  seed_search: false
  continuation: false
  final_simulation: false
  hiddenness_tests: false
  sphere_tests: false
  basin_slices: false
  bifurcation: false
  attractor_only: false
  lyapunov: true

lyapunov:
  method: "fractional_variational_abm_qr"
  t_final: 100.0
  t_burn: 20.0
  h: 0.005
  orthonormalization_interval: 10
  initial_condition: [0.1, 0.0, 0.0]
