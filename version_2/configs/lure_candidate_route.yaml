model: nonsmooth
q_values: [0.99, 0.999, 0.9998]

source:
  mode: auto
  search_roots:
    - .
    - runs
    - runs_machado_sweep_fast
    - chua_nonsmooth
    - chua_piecewise  # Compatibility with historical run folders.
    - chua_arctan
  reproduce_if_missing: true

manifest:
  output_dir: outputs/lure_route
  include_df_family:
    - lure_classic
  exclude_df_family:
    - machado
    - machado_biased

rhoH:
  enabled: true
  K: 20
  quadrature_points: 8192
  sigma0_default: 0.0
  threshold_good: 0.1
  threshold_marginal: 0.3

refined:
  output_dir: outputs/lure_route/refined
  priority_classes:
    - contact_weak
    - no_target_under_sample
    - insufficient_data
  radii:
    - 1.0e-6
    - 3.0e-6
    - 1.0e-5
    - 3.0e-5
    - 1.0e-4
    - 3.0e-4
    - 1.0e-3
    - 3.0e-3
    - 1.0e-2
  sampling_modes:
    - ball
    - sphere_shell
    - eigen_directions
  samples_per_radius: 500
  random_seed: 20260513
  stages:
    A:
      h: 0.01
      memory_length: 40
      t_final: 1500
    B:
      h: 0.005
      memory_length: 40
      t_final: 3000
    C:
      h: 0.005
      memory_length: 80
      t_final: 3000

classification:
  equilibrium_radius: 1.0e-3
  divergence_norm: 1.0e5
  target_hit_fraction_required: 0.70
  min_section_matches: 20
  robust_hit_min_count: 3

local_basin:
  enabled: true
  rhos: [1.0e-4, 1.0e-3, 1.0e-2]
  grid_fast: 201
  grid_final: 401
  planes:
    - xy
    - xz
    - eigenplane
