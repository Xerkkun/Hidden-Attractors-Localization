# Ruta separada para semillas Machado/FDF del Chua fraccionario no suave.
model: nonsmooth
q: 0.9998
frac_order: 0.9998
enforce_q_consistency: true

params:
  alpha_chua: 8.4562
  beta: 12.0732
  gamma_chua: 0.0052
  m0: -0.1768
  m1: -1.1468
  a1: 0.4
  a2: -1.5585
  rho: 1.0

outputs:
  root: outputs/machado_lure_route

manifest:
  output_dir: outputs/machado_lure_route
  include_df_family:
    - machado
    - machado_biased
  exclude_df_family: []

families:
  - classical_biased
  - machado_biased

machado:
  branch: 0
  mu_values:
    - 0.25
    - 0.5
    - 0.75
    - 1.0
    - 1.25
    - 1.5
    - 2.0
    - 3.0
    - 4.0
    - 5.0
  theta_values:
    - 0.0
    - 0.2617993877991494
    - 0.5235987755982988
    - 0.7853981633974483
    - 1.0471975511965976
    - 1.3089969389957472
    - 1.5707963267948966
    - 1.832595714594046
    - 2.0943951023931953
    - 2.356194490192345
    - 2.6179938779914944
    - 2.8797932657906435
    - 3.141592653589793
    - 3.4033920413889427
    - 3.665191429188092
    - 3.9269908169872414
    - 4.1887902047863905
    - 4.4505895925855405
    - 4.71238898038469
    - 4.974188368183839
    - 5.235987755982989
    - 5.497787143782138
    - 5.759586531581287
    - 6.021385919380437

search:
  A_min: 0.25
  A_max: 20.0
  omega_min: 0.0001
  omega_max: 10.0
  sigma0_min: -8.0
  sigma0_max: 8.0
  n_samples: 30000
  quadrature_points: 4096
  K_rhoH: 20
  local_refine_top: 300
  residual_keep: 0.05
  rhoH_keep: 0.30
  residual_priority: 0.02
  rhoH_priority: 0.15
  random_seed: 20260514
  source_hint_manifest: outputs/lure_route/lure_candidates_manifest.csv

fallback:
  enabled: true
  keep_best: 30
  lambda_rho: 0.05
  allow_rhoH_up_to: 1.0
  allow_residual_up_to: 0.5

seeds:
  phases:
    - 0.0
    - 0.2617993877991494
    - 0.5235987755982988
    - 0.7853981633974483
    - 1.0471975511965976
    - 1.3089969389957472
    - 1.5707963267948966
    - 1.832595714594046
    - 2.0943951023931953
    - 2.356194490192345
    - 2.6179938779914944
    - 2.8797932657906435
    - 3.141592653589793
    - 3.4033920413889427
    - 3.665191429188092
    - 3.9269908169872414
    - 4.1887902047863905
    - 4.4505895925855405
    - 4.71238898038469
    - 4.974188368183839
    - 5.235987755982989
    - 5.497787143782138
    - 5.759586531581287
    - 6.021385919380437

early_periodicity_filter:
  enabled: true
  max_candidates_for_screen: 30
  h: 0.01
  memory_length: 8.0
  t_transient: 120.0
  observation_time: 120.0
  discard_if_periodic: true
  entropy_min: 0.25
  dominant_ratio_max: 0.65
  relaxed_dominant_ratio: 0.45
  freq_drift_max: 0.05
  n_windows: 3
  min_range: 0.01
  divergence_norm: 120.0
  components:
    - x
    - y
    - z
  require_two_components: true
  save_rejected_csv: true
  matrix:
    enabled: true
    primary_case_id: efork_full_history
    cases:
      - case_id: efork_full_history
        solver: efork3
        memory_policy: full_history
      - case_id: efork_truncated_Lm8
        solver: efork3
        memory_policy: truncated
        memory_length: 8.0
      - case_id: abm_full_history
        solver: abm
        memory_policy: full_history
      - case_id: abm_truncated_Lm8
        solver: abm
        memory_policy: truncated
        memory_length: 8.0

continuation:
  enabled: false
  routes:
    - C1
  max_candidates: 6
  max_seeds_per_candidate: 1
  eta_start: 0.0
  eta_target: 1.0
  eta_steps: 9
  q_fixed: 0.9998
  h: 0.01
  memory_length: 20
  t_block: 200
  n_blocks: 8
  smooth_width: 0.2
  divergence_norm: 120
  equilibrium_tol: 0.001
  nontrivial_range: 0.01

early_equilibrium_filter:
  enabled: false
  rho: 1.0e-5
  h: 0.01
  memory_length: 40
  t_final: 1500

robustness:
  enabled: false
  cases:
    R0:
      h: 0.01
      memory_length: 40
      t_final: 3000
    R1:
      h: 0.005
      memory_length: 40
      t_final: 3000
    R2:
      h: 0.005
      memory_length: 80
      t_final: 6000

cost_guard:
  max_simulations_without_force: 2000
  max_estimated_hours_without_force: 12
