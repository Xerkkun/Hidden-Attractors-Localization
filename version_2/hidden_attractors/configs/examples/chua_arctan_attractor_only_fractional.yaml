experiment:
  name: "Chua Arctan Attractor Only Fractional"
  description: "Simulating specific fractional-order Chua arctan attractor directly"
  output_dir: "outputs/chua_arctan_attractor_fractional"

system:
  system_id: "chua_fractional_arctan"
  q: 0.95
  parameters:
    alpha: 8.4562
    beta: 12.0732
    gamma: 0.0052
    a1: 0.4
    a2: 0.8
    rho: 1.0

modes:
  dynamics_mode: "system"

integrator:
  name: "efork3"
  h: 0.001
  memory_mode: "window"
  memory_policy: "finite_window"
  memory_window_steps: 400

stages:
  seed_search: false
  continuation: false
  final_simulation: false
  hiddenness_tests: false
  sphere_tests: false
  basin_slices: false
  bifurcation: false
  attractor_only: true

simulation:
  t_final: 200.0
  t_burn: 50.0
  initial_condition: [0.1, 0.1, 0.1]

plots:
  enabled: true
  save_figures: true
  attractor: true
  timeseries: true
