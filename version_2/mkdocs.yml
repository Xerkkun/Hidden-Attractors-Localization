site_name: hidden-attractors-fo
site_description: Numerical workflows for hidden-attractor candidates in fractional-order systems.
repo_url: https://github.com/Xerkkun/Hidden-Attractors-Localization
repo_name: Xerkkun/Hidden-Attractors-Localization
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting_started.md
  - Reference:
      - API Reference: api_reference.md
      - API Stability Tiers: api_stability.md
  - Examples: examples.md
  - Systems: systems.md
  - Dynamical Analysis: dynamical_analysis.md
  - External Tools: external_tools.md
  - Unified Report: unified_report.md
  - Figure Gallery: figure_gallery.md
  - Code Reference Map: code_reference_map.md
  - Notebooks: notebooks.md
  - Workflows: workflows.md
  - Testing: testing.md
  - Repository Layout: repository_layout.md
  - Contributing: contributing.md
  - Citation: citation.md
  - Research Notes:
      - Library Structure: library_structure.md
      - Lure Candidate Route: lure_candidate_route.md
      - Versioning Policy: versioning.md
      - Dependency Policy: dependency_policy.md
      - Analysis Index: research/analysis.md
      - Physical Separation: physical_separation.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
